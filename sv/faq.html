    <h1>Allt du undrar om <em>CO₂-krediter</em></h1>
    <p class="sub">Vi svarar på de vanligaste frågorna från markägare och företag. Hittar du inte svaret? <a href="/sv/#kontakt" style="color:var(--sage);">Kontakta oss.</a></p>
  </div>
  <div id="faqList" style="display:flex;flex-direction:column;gap:2px;"></div>
</div>
<script>
const faqs = [
  {cat:"För markägare", items:[
    {q:"Vad är en koldioxidkredit?",a:"En koldioxidkredit (carbon credit) representerar ett ton CO₂ som bundits eller undvikits. Din skog binder koldioxid naturligt — det kan certifieras och säljas till företag som vill kompensera sina utsläpp."},
    {q:"Behöver jag avverka för att tjäna pengar?",a:"Nej, tvärtom. Krediter genereras just för att du behåller och vårdar skogen. Ju mer du låter den växa, desto fler krediter skapas. Det är ett ekonomiskt incitament att inte avverka."},
    {q:"Hur mycket kan jag tjäna?",a:"Det beror på skogens areal, bonitet och trädslag. En välskött granskog på 100 hektar kan generera 500–700 ton CO₂/år, värt 500 000–700 000 kr på den frivilliga marknaden. Använd vår CO₂-kalkylator för en uppskattning."},
    {q:"Vad innebär certifiering och måste jag certifiera mig?",a:"Certifiering är en tredjepartsgranskning som bekräftar att din skogs CO₂-bindning är verklig och varaktig. Utan certifiering är krediterna svårare att sälja till seriösa köpare. Vi guidar dig genom vad processen innebär och vilka steg som krävs."},
    {q:"Hur lång tid tar processen?",a:"Från första analys till första intäkt tar det vanligtvis 6–18 månader, beroende på standard och fastighetens förutsättningar. Vi guidar dig och hjälper till med affärsunderlaget."},
    {q:"Äger jag fortfarande marken och skogen?",a:"Absolut. Du säljer bara rätten till de koldioxidkrediter din skog genererar — inte marken, skogen eller avverkningsrätten. Du bestämmer fortfarande fullt ut hur du brukar fastigheten."},
    {q:"Kostar det något att anlita Renatum?",a:"Den inledande analysen är gratis. Vid ett affärsupplägg och förmedling tar vi ett arvode och/eller en procentsats av kreditintäkterna. Vi berättar mer om prissättningen vid första mötet."},
  ]},
  {cat:"För företag", items:[
    {q:"Vad är skillnaden på frivilliga och obligatoriska krediter?",a:"Obligatoriska krediter är reglerade (t.ex. EU ETS) och krävs av lag. Frivilliga krediter köper företag och privatpersoner av eget initiativ för att kompensera utsläpp som ännu inte kan elimineras. Renatum arbetar med den frivilliga marknaden."},
    {q:"Är svenska krediter trovärdiga?",a:"Ja — svenska skogskrediter har hög trovärdighet tack vare transparent lagstiftning, certifierade skogsbruksplaner och oberoende verifiering. Det är ett starkt argument i er hållbarhetskommunikation."},
    {q:"Hur vet vi att CO₂-bindningen verkligen sker?",a:"Certifierade krediter verifieras av oberoende tredje part (t.ex. Gold Standard, Plan Vivo eller liknande). Vi säkerställer att alla krediter vi förmedlar är spårbara och verifierade."},
    {q:"Kan vi kommunicera detta externt?",a:"Ja, och det är en styrka. Vi hjälper er med kommunikationsunderlag — vad krediterna representerar, vilken skog de kommer från och hur ni beskriver kompensationen på ett trovärdigt sätt."},
    {q:"Finns det ett minimiköp?",a:"Vi skräddarsyr lösningar efter er verksamhets behov. Kontakta oss så diskuterar vi vad som passar er."},
  ]},
  {cat:"Om koldioxidmarknaden", items:[
    {q:"Hur stort är marknaden?",a:"Den frivilliga koldioxidmarknaden växte med över 340% mellan 2020 och 2023 och förväntas fortsätta växa kraftigt mot 2030-målen. Sverige är ett av få länder med hög skogstäthet och starka certifieringsmöjligheter."},
    {q:"Vad kostar ett ton CO₂ på marknaden?",a:"Priset varierar kraftigt beroende på certifieringsstandard, ursprung och köpare — från 200 kr till över 2 000 kr per ton. Svenska skogsbaserade krediter prissätts generellt i det övre spannet tack vare hög trovärdighet."},
    {q:"Är detta greenwashing?",a:"Rätt hanterade krediter är inte greenwashing — de representerar verklig, mätbar och varaktig CO₂-bindning. Det är därför certifiering och transparens är så viktiga. Vi arbetar bara med standards som uppfyller de högsta kraven."},
  ]}
];
const el = document.getElementById('faqList');
faqs.forEach(section => {
  const cat = document.createElement('div');
  cat.style.cssText = 'margin-top:2rem;';
  cat.innerHTML = '<div style="font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--sage);font-weight:500;padding:0 0 0.8rem;border-bottom:2px solid var(--moss);margin-bottom:2px;">' + section.cat + '</div>';
  section.items.forEach((item,i) => {
    const d = document.createElement('div');
    d.style.cssText = 'background:var(--white);border:1px solid rgba(74,103,65,0.1);margin-bottom:2px;';
    d.innerHTML = '<button onclick="toggle(this)" style="width:100%;text-align:left;background:none;border:none;padding:1.2rem 1.5rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:1rem;font-family:DM Sans,sans-serif;"><span style="font-size:0.92rem;font-weight:400;color:var(--text);">' + item.q + '</span><span style="font-size:1.2rem;color:var(--sage);flex-shrink:0;transition:transform 0.3s;" class="arr">+</span></button><div style="display:none;padding:0 1.5rem 1.2rem;font-size:0.85rem;color:var(--muted);line-height:1.8;font-weight:300;border-top:1px solid rgba(74,103,65,0.08);">' + item.a + '</div>';
    cat.appendChild(d);
  });
  el.appendChild(cat);
});
function toggle(btn) {
  const ans = btn.nextElementSibling;
  const arr = btn.querySelector('.arr');
  const open = ans.style.display === 'block';
  ans.style.display = open ? 'none' : 'block';
  arr.textContent = open ? '+' : '−';
  arr.style.transform = open ? 'rotate(0)' : 'rotate(180deg)';
}
</script>
